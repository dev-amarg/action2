name: action pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: download code
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
      - name: install dependencies
        run: npm ci

      - name: run the app
        run: node app2.js
        
